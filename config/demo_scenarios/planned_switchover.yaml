id: planned_switchover
name: Planned switchover
description: >-
  Контролируемая плановая смена лидера на выбранную реплику без аварии.
steps:
  - name: precheck_cluster_health
    action: check_cluster_health
    details: Подтвердить готовность к switchover (здоровье и синхронность).
  - name: execute_switchover
    action: switchover
    details: Выполнить команду switchover с текущего лидера на выбранную реплику.
  - name: verify_new_roles
    action: verify_roles
    details: Проверить, что выбранная реплика стала лидером, старый лидер стал replica.
  - name: verify_service_availability
    action: verify_availability
    details: Убедиться, что доступность не выходила за пределы целевого SLO.
success_criteria:
  - Роли сменились контролируемо и предсказуемо.
  - Недоступность сервиса не превысила SLO.
  - Потери данных и split-brain отсутствуют.
