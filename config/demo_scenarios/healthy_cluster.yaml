id: healthy_cluster
name: Healthy cluster baseline check
description: >-
  Базовая проверка здоровья кластера перед нагрузкой и отказоустойчивыми сценариями.
steps:
  - name: check_all_nodes_reachable
    action: check_node_availability
    params:
      cluster_config_path: config/cluster.json
    details: Проверить доступность всех узлов кластера (SQL/SSH/API health-check).
  - name: check_replication_streams
    action: check_replication
    params:
      cluster_config_path: config/cluster.json
    details: Проверить, что все реплики подключены к лидеру и получают WAL.
  - name: check_replication_lag
    action: check_replication_lag
    params:
      cluster_config_path: config/cluster.json
    details: Убедиться, что lag на всех репликах ниже целевого порога.
  - name: check_roles
    action: check_cluster_roles
    params:
      cluster_config_path: config/cluster.json
    wait_condition:
      current_roles:
        masters:
          count_equals: 1
        cardinality_ok:
          equals: true
    expected:
      current_roles:
        masters:
          count_equals: 1
        slaves:
          count_gte: 1
        has_single_master:
          equals: true
        all_other_nodes_are_slaves:
          equals: true
        cardinality_ok:
          equals: true
    details: Проверить корректное распределение ролей leader/replica.
success_criteria:
  - В кластере ровно 1 лидер.
  - В кластере N-1 реплик.
  - Replication lag у всех реплик ниже заданного порога.
  - Отсутствуют признаки деградации сервиса.
