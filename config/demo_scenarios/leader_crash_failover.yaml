id: leader_crash_failover
name: Leader crash failover
description: >-
  Аварийный failover при внезапном падении лидера.
steps:
  - name: capture_initial_master
    action: verify_roles
    target_node: cluster
    params:
      cluster_config_path: config/cluster.json
      store_current_master_as: old_master
    expected:
      current_roles:
        master:
          not_equals: ""
    details: Сохранить исходного лидера в runtime context перед fault-injection.
  - name: simulate_leader_failure
    action: kill_db_process
    target_node: __CURRENT_LEADER__
    params:
      cluster_config_path: config/cluster.json
      environment: demo
      demo_mode: true
      duration_sec: 15
    details: Симулировать падение лидера безопасной fault-injection операцией.
  - name: wait_for_failover
    action: verify_roles
    target_node: cluster
    params:
      cluster_config_path: config/cluster.json
    wait_condition:
      current_roles:
        master_count:
          equals: 1
        has_single_master:
          equals: true
        master:
          not_equals: __RUN_METRIC:old_master__
        masters:
          count_equals: 1
    timeout: 45
    expected:
      current_roles:
        master_count:
          equals: 1
        has_single_master:
          equals: true
        master:
          not_equals: __RUN_METRIC:old_master__
        masters:
          count_equals: 1
    details: Дождаться автоматического выбора нового лидера по runtime-метрикам.
  - name: validate_service_recovery
    action: verify_availability
    target_node: cluster
    timeout: 60
    params:
      cluster_config_path: config/cluster.json
      slo_window_sec: 120
    wait_condition:
      measured_downtime_sec:
        lte: 60
      availability_ratio:
        gte: 0.75
      nodes_up:
        count_gte: 2
    expected:
      measured_downtime_sec:
        lte: 60
      availability_ratio:
        gte: 0.75
      nodes_up:
        count_gte: 2
    details: Проверить восстановление доступности сервиса после failover.
  - name: recover_failed_leader
    action: recover_action
    target_node: __CURRENT_LEADER__
    params:
      cluster_config_path: config/cluster.json
      rollback_id: __ROLLBACK_ID:simulate_leader_failure__
      environment: demo
      demo_mode: true
    details: Вернуть fault-injection состояние в исходное для идемпотентного повторного запуска.
success_criteria:
  - Новый лидер выбран автоматически.
  - Сервис восстановлен в пределах T секунд.
  - Кластер перешёл в консистентное состояние после failover.
