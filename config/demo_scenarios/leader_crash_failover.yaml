id: leader_crash_failover
name: Leader crash failover
description: >-
  Аварийный failover при внезапном падении лидера.
steps:
  - name: simulate_leader_failure
    action: fault_injection
    details: Симулировать падение лидера (stop/kill или network isolate).
  - name: wait_for_failover
    action: wait_failover
    details: Дождаться автоматического выбора нового лидера.
  - name: validate_service_recovery
    action: check_service_recovery
    details: Проверить восстановление доступности сервиса после failover.
  - name: validate_write_path
    action: verify_write_operations
    details: Проверить, что запись успешно выполняется через нового лидера.
success_criteria:
  - Новый лидер выбран автоматически.
  - Сервис восстановлен в пределах T секунд.
  - Кластер перешёл в консистентное состояние после failover.
