id: old_leader_return_rewind
name: Old leader return with rewind/recovery
description: >-
  Возврат бывшего лидера после failover с корректным rewind/recovery и присоединением как replica.
steps:
  - name: pause_old_leader
    action: pause_node
    target_node: pg-node-1
    params:
      environment: demo
      demo_mode: true
      duration_sec: 10
    details: Зафиксировать бывший лидер в контролируемом состоянии перед восстановлением.
  - name: run_rewind_or_recovery
    action: recover_action
    target_node: pg-node-1
    params:
      environment: demo
      demo_mode: true
    details: Выполнить rollback fault-injection как эквивалент этапа rewind/recovery.
  - name: attach_as_replica
    action: verify_roles
    target_node: cluster
    params:
      cluster_config_path: config/cluster.json
    details: Проверить, что бывший лидер присоединился без повторного promotion.
  - name: verify_catchup
    action: verify_availability
    target_node: cluster
    params:
      cluster_config_path: config/cluster.json
      slo_window_sec: 180
    expected:
      availability_ratio:
        gte: 0.75
    details: Проверить корректное догоняние WAL/журнала и стабильную репликацию.
success_criteria:
  - Узел не становится вторым лидером.
  - Узел корректно догоняет WAL/лог.
  - Репликация стабильна, роли кластера консистентны.
